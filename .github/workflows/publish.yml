name: Pack and Publish Chrome Extension

on:
  push:
    branches: [main]
    paths:
      - 'src/manifest.json'

permissions:
  contents: write

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('src/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Install Python dependencies
        run: pip3 install cryptography

      - name: Pack extension with Python CRX3
        run: |
          # Write key.pem from secret
          echo "${{ secrets.EXTENSION_KEY }}" > key.pem

          # Pack using Python CRX3 builder (Chrome --pack-extension ignores key on some systems)
          python3 << 'PYEOF'
          import struct, hashlib, zipfile, io, os, subprocess, sys

          def encode_varint(value):
              result = b''
              while value > 0x7f:
                  result += bytes([(value & 0x7f) | 0x80])
                  value >>= 7
              result += bytes([value & 0x7f])
              return result

          def encode_field(field_num, wire_type, data):
              tag = (field_num << 3) | wire_type
              if wire_type == 2:
                  return encode_varint(tag) + encode_varint(len(data)) + data
              elif wire_type == 0:
                  return encode_varint(tag) + encode_varint(data)
              else:
                  raise ValueError(f"Unsupported wire type: {wire_type}")

          zip_buffer = io.BytesIO()
          with zipfile.ZipFile(zip_buffer, 'w', zipfile.ZIP_DEFLATED) as zf:
              for root, dirs, files in os.walk('src'):
                  for file in files:
                      filepath = os.path.join(root, file)
                      arcname = os.path.relpath(filepath, 'src')
                      zf.write(filepath, arcname)
          zip_data = zip_buffer.getvalue()

          with open('key.pem', 'rb') as f:
              key_pem = f.read()

          result = subprocess.run(['openssl', 'rsa', '-in', 'key.pem', '-pubout', '-outform', 'DER'], capture_output=True)
          pub_key_der = result.stdout

          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding
          from cryptography.hazmat.backends import default_backend

          private_key = serialization.load_pem_private_key(key_pem, password=None, backend=default_backend())

          placeholder_sig = b'\x00' * 256
          signed_data_fields = encode_field(1, 2, placeholder_sig) + encode_field(2, 2, pub_key_der)
          crx_header = encode_field(2, 2, signed_data_fields)
          signed_content = b'CRX3 SignedData\x00' + crx_header + zip_data
          signature = private_key.sign(signed_content, padding.PKCS1v15(), hashes.SHA256())

          signed_data_fields = encode_field(1, 2, signature) + encode_field(2, 2, pub_key_der)
          crx_header = encode_field(2, 2, signed_data_fields)
          crx = b'Cr24' + struct.pack('<I', 3) + struct.pack('<I', len(crx_header)) + crx_header + zip_data

          with open('extension.crx', 'wb') as f:
              f.write(crx)
          print(f"CRX created: {len(crx)} bytes")
          PYEOF

          # Clean up key
          rm key.pem

          echo "✓ Packed extension.crx"

      - name: Update updates.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update version in updates.xml (only in updatecheck element)
          sed -i "s|version='[0-9][0-9.]*' />|version='$VERSION' />|" updates.xml

          echo "✓ Updated updates.xml to version $VERSION"
          cat updates.xml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add extension.crx updates.xml

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-pack v${{ steps.version.outputs.version }} [skip ci]"
            git push
            echo "✓ Committed and pushed"
          fi
