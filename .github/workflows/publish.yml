name: Pack and Publish Chrome Extension

on:
  push:
    branches: [main]
    paths:
      - 'src/manifest.json'

permissions:
  contents: write

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('src/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Install Python dependencies
        run: pip3 install cryptography

      - name: Pack extension with Python CRX3
        run: |
          # Write key.pem from secret
          echo "${{ secrets.EXTENSION_KEY }}" > key.pem

          # Pack using Python CRX3 builder (Chrome --pack-extension ignores key on some systems)
          python3 << 'PYEOF'
          import struct, hashlib, zipfile, io, os, subprocess, sys

          def encode_varint(value):
              result = b''
              while value > 0x7f:
                  result += bytes([(value & 0x7f) | 0x80])
                  value >>= 7
              result += bytes([value & 0x7f])
              return result

          def encode_field(field_num, wire_type, data):
              tag = (field_num << 3) | wire_type
              if wire_type == 2:
                  return encode_varint(tag) + encode_varint(len(data)) + data
              elif wire_type == 0:
                  return encode_varint(tag) + encode_varint(data)
              else:
                  raise ValueError(f"Unsupported wire type: {wire_type}")

          zip_buffer = io.BytesIO()
          with zipfile.ZipFile(zip_buffer, 'w', zipfile.ZIP_DEFLATED) as zf:
              for root, dirs, files in os.walk('src'):
                  for file in files:
                      filepath = os.path.join(root, file)
                      arcname = os.path.relpath(filepath, 'src')
                      zf.write(filepath, arcname)
          zip_data = zip_buffer.getvalue()

          with open('key.pem', 'rb') as f:
              key_pem = f.read()

          result = subprocess.run(['openssl', 'rsa', '-in', 'key.pem', '-pubout', '-outform', 'DER'], capture_output=True)
          pub_key_der = result.stdout

          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding
          from cryptography.hazmat.backends import default_backend

          private_key = serialization.load_pem_private_key(key_pem, password=None, backend=default_backend())

          placeholder_sig = b'\x00' * 256
          signed_data_fields = encode_field(1, 2, placeholder_sig) + encode_field(2, 2, pub_key_der)
          crx_header = encode_field(2, 2, signed_data_fields)
          signed_content = b'CRX3 SignedData\x00' + crx_header + zip_data
          signature = private_key.sign(signed_content, padding.PKCS1v15(), hashes.SHA256())

          signed_data_fields = encode_field(1, 2, signature) + encode_field(2, 2, pub_key_der)
          crx_header = encode_field(2, 2, signed_data_fields)
          crx = b'Cr24' + struct.pack('<I', 3) + struct.pack('<I', len(crx_header)) + crx_header + zip_data

          with open('extension.crx', 'wb') as f:
              f.write(crx)
          print(f"CRX created: {len(crx)} bytes")

          # Also save the ZIP for easy download (remove update_url for unpacked compatibility)
          import json
          with open('src/manifest.json', 'r') as f:
              manifest = json.load(f)
          if 'update_url' in manifest:
              del manifest['update_url']
          # Create a temporary manifest without update_url
          import tempfile, shutil
          temp_src = tempfile.mkdtemp()
          for root, dirs, files in os.walk('src'):
              for file in files:
                  src_file = os.path.join(root, file)
                  rel_path = os.path.relpath(src_file, 'src')
                  dst_file = os.path.join(temp_src, rel_path)
                  os.makedirs(os.path.dirname(dst_file), exist_ok=True)
                  if file == 'manifest.json':
                      with open(dst_file, 'w') as f:
                          json.dump(manifest, f, indent=2, ensure_ascii=False)
                  else:
                      shutil.copy2(src_file, dst_file)
          zip_buffer2 = io.BytesIO()
          with zipfile.ZipFile(zip_buffer2, 'w', zipfile.ZIP_DEFLATED) as zf:
              for root, dirs, files in os.walk(temp_src):
                  for file in files:
                      filepath = os.path.join(root, file)
                      arcname = os.path.relpath(filepath, temp_src)
                      zf.write(filepath, arcname)
          with open('extension.zip', 'wb') as f:
              f.write(zip_buffer2.getvalue())
          shutil.rmtree(temp_src)
          print(f"ZIP created: {len(zip_buffer2.getvalue())} bytes (without update_url)")
          PYEOF

          # Clean up key
          rm key.pem

          echo "✓ Packed extension.crx"

      - name: Update updates.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update version in updates.xml (only in updatecheck element)
          sed -i "s|version='[0-9][0-9.]*' />|version='$VERSION' />|" updates.xml

          echo "✓ Updated updates.xml to version $VERSION"
          cat updates.xml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add extension.crx extension.zip updates.xml

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-pack v${{ steps.version.outputs.version }} [skip ci]"
            git push
            echo "✓ Committed and pushed"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          # Write release notes to a file to avoid shell escaping issues
          cat > release-notes.md <<'ENDNOTES'
## 📦 下载

点击下方的 **extension.zip** 文件下载最新版安装包。

---

## 🔧 安装教程（首次安装）

**第 1 步：下载安装包**
点击上方 **extension.zip** 文件，下载到电脑。

**第 2 步：解压到固定位置**
把下载的 extension.zip 解压到一个**不会移动、不会删除**的地方，例如：
- Windows：`D:\Tools\FliggyToolbox`
- Mac：`~/Applications/FliggyToolbox`

> ⚠️ 解压出来的文件夹**不能移动或删除**，否则扩展会失效。

**第 3 步：打开 Chrome 扩展页面**
在浏览器地址栏输入以下地址并回车：
```
chrome://extensions/
```

**第 4 步：开启开发者模式**
在页面**右上角**，找到「开发者模式」开关，把它打开（变成蓝色）。

**第 5 步：加载扩展**
点击左上角「**加载已解压的扩展程序**」按钮 → 选择解压出来的文件夹 → 确定。

**第 6 步：完成 ✅**
刷新飞猪客服工作页面，扩展已生效。可以在浏览器右上角拼图图标里看到「飞猪客服工具箱」。

---

## 🔄 更新教程（有新版本时）

当管理员发布新版本时，浏览器右下角会弹出通知：

> **飞猪客服工具箱有新版本**
> 发现新版本 X.XX（当前 X.XX），点击下载安装包并更新

**操作步骤：**
1. **点击通知** → 自动打开本下载页面
2. **下载** → 点击下方 **extension.zip** 文件
3. **解压覆盖** → 把新文件解压，**覆盖**之前安装的文件夹
4. **刷新扩展** → 打开 `chrome://extensions/`，在「飞猪客服工具箱」卡片上点击**刷新按钮**（圆形箭头图标）

---

## ❓ 常见问题

**Q：加载时提示"清单文件缺失或不可读取"？**
A：选错文件夹了。确保选择的文件夹里**直接有 manifest.json**，而不是它的子文件夹。

**Q：扩展突然消失了？**
A：可能是解压的文件夹被移动或删除了。重新下载 zip，解压到固定位置，重新加载即可。

**Q：Chrome 弹出"禁用开发者模式扩展程序"？**
A：这是 Chrome 的安全提示，点击「**取消**」就可以继续使用，是正常现象。

**Q：版本没有更新？**
A：打开 `chrome://extensions/`，手动点击「更新」按钮。
ENDNOTES

          # Create release (skip if already exists)
          gh release create "$TAG" extension.zip \
            --title "v${VERSION} - 飞猪客服工具箱" \
            --notes-file release-notes.md \
            --draft=false \
            2>/dev/null || echo "Release $TAG already exists, updating assets..."

          # If release already existed, upload/overwrite the asset
          gh release upload "$TAG" extension.zip --clobber 2>/dev/null || true

          echo "✓ Release $TAG ready"
