name: Pack and Publish Chrome Extension

on:
  push:
    branches: [main]
    paths:
      - 'src/manifest.json'

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('src/manifest.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Pack extension with Chrome
        run: |
          # Write key.pem from secret
          echo "${{ secrets.EXTENSION_KEY }}" > key.pem

          # Pack extension using Chrome
          google-chrome-stable --pack-extension=src --pack-extension-key=key.pem --no-sandbox --headless

          # Move packed extension
          mv src.crx extension.crx

          # Clean up key
          rm key.pem

          echo "✓ Packed extension.crx"

      - name: Update updates.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update version in updates.xml (only in updatecheck element)
          sed -i "s|version='[0-9][0-9.]*' />|version='$VERSION' />|" updates.xml

          echo "✓ Updated updates.xml to version $VERSION"
          cat updates.xml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add extension.crx updates.xml

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-pack v${{ steps.version.outputs.version }} [skip ci]"
            git push
            echo "✓ Committed and pushed"
          fi
